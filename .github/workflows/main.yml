name: Code Coverage Check

on:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build & Test with Coverage
        run: mvn clean verify

      - name: Extract JaCoCo Coverage
        id: coverage
        run: |
          COVERED=$(grep -oPm1 '(?<=<counter type="INSTRUCTION" covered=")[0-9]+' target/site/jacoco/jacoco.xml || echo 0)
          MISSED=$(grep -oPm1 '(?<=<counter type="INSTRUCTION" missed=")[0-9]+' target/site/jacoco/jacoco.xml || echo 0)
      
          TOTAL=$((COVERED + MISSED))
      
          if [ "$TOTAL" -eq 0 ]; then
            PERCENT=0
          else
            PERCENT=$((100 * COVERED / TOTAL))
          fi
      
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Comment PR with Coverage
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ## Code Coverage Report

            Coverage: **${{ steps.coverage.outputs.coverage }}%**

            ${{ steps.coverage.outputs.coverage >= 80 && '🟢 PASS' || '🔴 FAIL (Minimum 80% required)' }}

      - name: Fail if Coverage < 80%
        run: |
          if [ ${{ steps.coverage.outputs.coverage }} -lt 80 ]; then
            echo "Coverage below 80%"
            exit 1
          fi