name: Code Coverage Check

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build & Test (Generate JaCoCo)
        run: mvn clean verify

      - name: Debug JaCoCo (optional)
        run: ls -R target/site || true

      - name: Extract JaCoCo Coverage
        id: coverage
        run: |
          FILE=target/site/jacoco/jacoco.xml

          if [ ! -f "$FILE" ]; then
            echo "coverage=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          LINE=$(grep 'type="INSTRUCTION"' $FILE | head -1)

          COVERED=$(echo $LINE | sed -n 's/.*covered="\([0-9]*\)".*/\1/p')
          MISSED=$(echo $LINE | sed -n 's/.*missed="\([0-9]*\)".*/\1/p')

          COVERED=${COVERED:-0}
          MISSED=${MISSED:-0}

          TOTAL=$((COVERED + MISSED))

          if [ "$TOTAL" -eq 0 ]; then
            PERCENT=0
          else
            PERCENT=$((100 * COVERED / TOTAL))
          fi

          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Comment PR with Coverage
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ## Code Coverage Report

            Coverage: **${{ steps.coverage.outputs.coverage }}%**

            ${{ steps.coverage.outputs.coverage >= 80 && '🟢 PASS' || '🔴 FAIL (Minimum 80% required)' }}

      - name: Fail if Coverage < 80%
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          COVERAGE=${COVERAGE:-0}

          if [ "$COVERAGE" -lt 80 ]; then
            echo "Coverage below 80%"
            exit 1
          fi